name: Bug Report | Bug 报告
description: Report a bug or issue with the website or ebook
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill out the form below.
        感谢报告！请填写以下表格。

  - type: textarea
    id: description
    attributes:
      label: Description | 描述
      description: What happened? What did you expect to happen?
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce | 复现步骤
      description: How can we reproduce this issue?
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error...
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area | 影响区域
      options:
        - Website (React SPA)
        - Chinese ebook (zh/)
        - English ebook (en/)
        - Images
        - Other
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser & Device | 浏览器和设备
      placeholder: e.g. Chrome 120 on macOS, Safari on iPhone 15

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots | 截图
      description: If applicable, add screenshots to help explain.
